<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>無料恋愛鑑定 | 星影の導き</title>
  <meta name="description" content="名前・生年月日・相談ジャンルから、無料で恋愛運を鑑定します。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Zen+Old+Mincho:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>

  <main class="page">
    <section class="hero card">
      <p class="kicker">無料鑑定</p>
      <h1>星影の導き<br><span>恋の行方を、今ここで</span></h1>
      <p class="lead">TV・SNSで話題の占術をベースに、あなたの恋愛テーマを無料で鑑定。<br>入力は30秒、結果はその場で表示されます。</p>

      <div class="profile">
        <div class="profile-image-wrap">
          <img src="./assets/profile-image.png" alt="鑑定師プロフィール" class="profile-image">
        </div>
        <div class="profile-copy">
          <p class="profile-role">鑑定士</p>
          <h2>占星術師ゆう</h2>
          <p>西洋占星術・タロット・数秘を統合し、恋愛領域の深層心理を読み解いていきます</p>
        </div>
      </div>

      <ul class="trust-list">
        <li>24時間いつでも無料鑑定</li>
        <li>個人情報は鑑定以外に利用しません</li>
        <li>スマホ・PC両対応</li>
      </ul>
    </section>

    <section class="form-section card" id="appraisal">
      <h2>無料恋愛鑑定フォーム</h2>
      <p class="form-lead">次の3項目を入力してください。</p>

      <form id="fortune-form" novalidate>
        <label class="field">
          <span>名前</span>
          <input type="text" id="name" name="name" placeholder="例）山田 花子" maxlength="30" required>
          <small class="error" id="name-error"></small>
        </label>

        <label class="field">
          <span>生年月日</span>
          <input type="date" id="birthdate" name="birthdate" required>
          <small class="error" id="birthdate-error"></small>
        </label>

        <fieldset class="field genre-field">
          <legend>ジャンル選択</legend>
          <label><input type="radio" name="genre" value="片思い・進展" required> 1. 片思い・進展</label>
          <label><input type="radio" name="genre" value="相手の気持ち"> 2. 相手の気持ち</label>
          <label><input type="radio" name="genre" value="復縁・やり直し"> 3. 復縁・やり直し</label>
          <small class="error" id="genre-error"></small>
        </fieldset>

        <button type="submit" class="cta">無料で鑑定する</button>
      </form>
    </section>

    <section class="result card hidden" id="result" aria-live="polite">
      <h2>無料鑑定結果</h2>
      <p class="result-meta" id="result-meta"></p>
      <div id="result-text" class="result-text"></div>
      <p class="result-note">※本結果は無料版です。詳細鑑定では時期・行動・相手心理をさらに深く表示できます。</p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
